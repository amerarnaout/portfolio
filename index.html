<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<canvas id="hero3d"></canvas>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let astronaut = null;
let headBone = null;

// -----------------------------
// SAFE CURSOR SYSTEM (no inversion bugs)
// -----------------------------
const mouse = { x: 0, y: 0 };
const target = { x: 0, y: 0 };

window.addEventListener("pointermove", (e) => {
  target.x = (e.clientX / window.innerWidth) * 2 - 1;
  target.y = (e.clientY / window.innerHeight) * 2 - 1;
});

// -----------------------------
// INIT
// -----------------------------
init();
animate();

function init() {

  const canvas = document.getElementById("hero3d");

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    35,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );

  camera.position.z = 6;

  renderer = new THREE.WebGLRenderer({
    canvas,
    alpha: true,
    antialias: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // LIGHTS
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));

  const dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(2, 2, 2);
  scene.add(dir);

  // -----------------------------
  // LOAD ASTRO (ROBUST)
  // -----------------------------
  const loader = new THREE.GLTFLoader();

  loader.load(
    "astronaut.glb",

    (gltf) => {

      astronaut = gltf.scene;
      scene.add(astronaut);

      // safety reset (prevents invisible optimized models)
      astronaut.position.set(0, 0, 0);
      astronaut.scale.set(1, 1, 1);

      astronaut.traverse((c) => {
        if (c.isMesh) {
          c.frustumCulled = false;
          c.visible = true;
        }

        if (c.isBone && c.name?.toLowerCase().includes("head")) {
          headBone = c;
        }
      });

      console.log("✅ Astronaut loaded");
    },

    undefined,

    (err) => {
      console.error("❌ GLB load error:", err);
    }
  );
}

// -----------------------------
// ANIMATION LOOP (STABLE + CORRECT AXES)
// -----------------------------
function animate() {

  requestAnimationFrame(animate);

  // smooth cursor
  mouse.x += (target.x - mouse.x) * 0.08;
  mouse.y += (target.y - mouse.y) * 0.08;

  if (astronaut) {

    const rotX = mouse.y * 0.25;
    const rotY = mouse.x * 0.45;

    astronaut.rotation.x += (rotX - astronaut.rotation.x) * 0.08;
    astronaut.rotation.y += (rotY - astronaut.rotation.y) * 0.08;
  }

  if (headBone) {

    headBone.rotation.x += (mouse.y * 0.9 - headBone.rotation.x) * 0.12;
    headBone.rotation.y += (mouse.x * 0.9 - headBone.rotation.y) * 0.12;
  }

  renderer.render(scene, camera);
}

// -----------------------------
// RESIZE SAFE
// -----------------------------
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
